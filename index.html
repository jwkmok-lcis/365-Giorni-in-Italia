<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>365 Giorni in Italia</title>
    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#e94560" />
    <link rel="icon" href="icons/icon-192.png" />
    <link rel="apple-touch-icon" href="icons/icon-192.png" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <button id="hardResetBtn" class="hard-reset-btn" type="button" aria-label="Hard refresh app">
        Hard Reset
      </button>
      <section class="stage-shell" aria-label="365 Giorni in Italia stage">
        <header class="hud hidden" id="gameHeader">
          <h1>365 Giorni in Italia</h1>
          <p class="subtitle">Investigate Bologna's hidden ragù history while each conversation trains a live grammar skill track.</p>
        </header>
        <div class="canvas-wrap">
          <canvas id="gameCanvas" width="800" height="512" tabindex="0" aria-label="365 Giorni in Italia game canvas"></canvas>
          <aside id="infoDrawer" class="info-drawer hidden" aria-live="polite">
            <section id="statusPanel" class="panel"></section>
            <section id="promptPanel" class="panel"></section>
          </aside>
        </div>
      </section>
    </main>
    <script type="module" src="src/main.js"></script>
    <script>
      if ("serviceWorker" in navigator) {
        navigator.serviceWorker.register("sw.js");
      }
    </script>
  </body>
</html>
